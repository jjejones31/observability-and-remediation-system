version: "3.9"

services:
  remediation:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DEVIN_API_KEY=${DEVIN_API_KEY:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_REPO=${GITHUB_REPO:-jjejones31/superset}
      - GH_TOKEN=${GH_TOKEN:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Simulate mode — no real API calls, for demo/testing
  remediation-simulate:
    build: .
    ports:
      - "8081:8080"
    command: ["python", "src/webhook_server.py", "--port", "8080", "--simulate"]
    environment:
      - GITHUB_REPO=${GITHUB_REPO:-jjejones31/superset}
    volumes:
      - ./data-sim:/app/data
    profiles:
      - simulate
